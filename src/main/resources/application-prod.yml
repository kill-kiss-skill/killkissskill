spring:
  datasource:
    url: jdbc:mysql://localhost:3306/itas?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: ${AI_CHAT_MODEL:claude-sonnet-4-6}
          temperature: 0.7
          max-tokens: 4096
    openai:
      api-key: ${EMBEDDING_API_KEY}
      base-url: ${EMBEDDING_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
      embedding:
        options:
          model: ${EMBEDDING_MODEL:embedding-3}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  collection-name: knowledge_vectors
  dimension: 1536

itas:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  upload:
    path: ${UPLOAD_PATH:/data/uploads/}
  rag:
    chunk-size: 512
    chunk-overlap: 50
    top-k: 5
